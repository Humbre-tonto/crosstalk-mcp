name: build (java)

on:
  push:
    branches: [main]
    paths: ["java/**", ".github/workflows/build-java.yml"]
  pull_request:
    paths: ["java/**", ".github/workflows/build-java.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: java

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: java/pom.xml

      - name: Build (package)
        run: mvn -B -ntp clean package

      - name: Smoke test (boot + auth + tools)
        run: |
          export RELAY_TOKEN=ci-secret
          export PORT=8765
          java -jar target/crosstalk-mcp.jar &
          PID=$!
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null -H "Authorization: Bearer ci-secret" http://localhost:8765/api/channels; then break; fi
            sleep 1
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8765/api/channels)
          test "$code" = "401" || { echo "expected 401 without token, got $code"; kill $PID; exit 1; }
          curl -sf -H "Authorization: Bearer ci-secret" http://localhost:8765/api/channels
          kill $PID

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: crosstalk-mcp-jar
          path: java/target/crosstalk-mcp.jar
          if-no-files-found: error
