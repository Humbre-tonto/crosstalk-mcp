name: release

# Fires on a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v1.0.0) — used for the artifact name"
        required: true

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  # ---- Java: build the fat jar ----
  jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: java/pom.xml
      - name: Build jar
        working-directory: java
        run: mvn -B -ntp -DskipTests package
      - name: Stage jar with version in the name
        run: |
          mkdir -p dist
          cp java/target/crosstalk-mcp.jar "dist/crosstalk-mcp-${VERSION}.jar"
      - uses: actions/upload-artifact@v4
        with:
          name: jar
          path: dist/*.jar
          if-no-files-found: error

  # ---- GitHub Release with the jar attached ----
  github-release:
    needs: jar
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jar
          path: dist
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: dist/*.jar

  # ---- Python: build + publish to PyPI (Trusted Publishing / OIDC) ----
  pypi:
    runs-on: ubuntu-latest
    environment: pypi          # configure this name in the PyPI trusted-publisher settings
    permissions:
      id-token: write          # required for Trusted Publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set package version from the tag
        working-directory: python
        run: |
          V="${VERSION#v}"   # strip leading 'v'
          sed -i "s/^version = .*/version = \"$V\"/" pyproject.toml
          echo "Building crosstalk-mcp $V"
      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          # To use an API token instead of Trusted Publishing, delete the
          # `permissions: id-token: write` above and add:
          #   password: ${{ secrets.PYPI_API_TOKEN }}

  # ---- Docker images to GHCR (one per edition) ----
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        edition: [java, python]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image name + tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/crosstalk-mcp-${{ matrix.edition }}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.edition }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
